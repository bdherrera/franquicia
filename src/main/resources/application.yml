  spring:
    application:
      name: franquicias-api

    datasource:
      url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/franquicias_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
      username: ${SPRING_DATASOURCE_USERNAME:root}
      password: ${SPRING_DATASOURCE_PASSWORD:admin}
      driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
      hibernate:
        ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
      show-sql: true
      properties:
        hibernate:
          format_sql: true

  server:
    port: 8080

  springdoc:
    swagger-ui:
      enabled: true
    api-docs:
      enabled: true